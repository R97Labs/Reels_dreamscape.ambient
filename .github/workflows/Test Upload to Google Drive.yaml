name: Upload to Google Drive

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Save Service Account JSON
        run: |
          mkdir -p $HOME/.secrets
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > $HOME/.secrets/service_account.json

      - name: Upload file to Google Drive
        run: |
          python - <<EOF
          import os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SERVICE_ACCOUNT_FILE = os.path.expanduser("~/.secrets/service_account.json")
          SCOPES = ["https://www.googleapis.com/auth/drive.file"]

          creds = service_account.Credentials.from_service_account_file(
              SERVICE_ACCOUNT_FILE, scopes=SCOPES
          )

          drive_service = build('drive', 'v3', credentials=creds)

          file_metadata = {'name': 'spotify.png'}  # File name in Drive
          media = MediaFileUpload('spotify.png', mimetype='image/png')

          file = drive_service.files().create(body=file_metadata, media_body=media, fields='id').execute()
          print("Uploaded File ID:", file.get('id'))
          EOF
