name: Render Reels & Upload to Google Drive

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Install ffmpeg and rclone
      - name: Install ffmpeg and rclone
        run: |
          sudo apt update
          sudo apt install -y ffmpeg unzip curl
          curl https://rclone.org/install.sh | sudo bash

      # Step 3: Setup rclone with service account
      - name: Setup rclone
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$GDRIVE_SERVICE_ACCOUNT" > ~/service_account.json
          
          # Verify service account file was created
          if [ ! -s ~/service_account.json ]; then
            echo "ERROR: Service account file is empty!"
            exit 1
          fi
          
          # Create rclone config with proper formatting
          cat > ~/.config/rclone/rclone.conf << 'RCLONE_EOF'
          [gdrive]
          type = drive
          scope = drive.file
          service_account_file = /home/runner/service_account.json
          RCLONE_EOF
          
          # Test rclone config
          rclone version
          rclone listremotes

      # Step 4: Prepare paths and clean old outputs
      - name: Prepare paths
        run: |
          mkdir -p output tmp
          rm -rf output/* tmp/*

      # Step 5: Run your reel generation script
      - name: Run script
        run: |
          if [ ! -f script.sh ]; then
            echo "ERROR: script.sh not found!"
            exit 1
          fi
          chmod +x script.sh
          ./script.sh

      # Step 6: Check output files
      - name: Check output files
        run: |
          echo "=== Files in output directory ==="
          ls -lh output/ || echo "❌ No output files found"
          du -sh output/ || true

      # Step 7: Upload output as temporary GitHub artifact
      - name: Upload output artifact (1 day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-video
          path: output/
          retention-days: 1

      # Step 8: Upload to Google Drive
      - name: Upload to Google Drive
        run: |
          echo "Uploading to Google Drive folder..."
          rclone copy output/ gdrive:1EVIHk24_3C7DsCLcYoQOdrM_T11UrkWH/ -v --stats 1s
          echo "✅ Upload complete!"
